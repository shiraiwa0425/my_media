name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Install SSM plugin
        run: |
          curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o "session-manager-plugin.deb"
          sudo dpkg -i session-manager-plugin.deb

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.EC2_DEPLOY_PATH }}" ]; then
            echo "Error: EC2_DEPLOY_PATH secret is not set."
            exit 1
          fi

      - name: Deploy to EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"cd ${{ secrets.EC2_DEPLOY_PATH }}\",\"git pull origin main\",\"sudo docker-compose up -d --build\",\"sudo docker-compose exec -T app composer install --no-dev --optimize-autoloader\"]" \
            --region ap-northeast-1 \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          # Poll until terminal status (Success/Failed/TimedOut/Cancelled)
          STATUS="Pending"
          for i in $(seq 1 60); do
            INVOCATION=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "{Status:Status,StdOut:StandardOutputContent,StdErr:StandardErrorContent}" \
              --output json 2>/dev/null || echo '{"Status":"Pending","StdOut":"","StdErr":""}')
            STATUS=$(echo "$INVOCATION" | jq -r '.Status')
            echo "[$i/60] Status: $STATUS"
            case "$STATUS" in
              Success|Failed|TimedOut|Cancelled|Undeliverable|Terminated) break ;;
            esac
            sleep 10
          done

          echo "--- stdout ---"
          echo "$INVOCATION" | jq -r '.StdOut'
          echo "--- stderr ---"
          echo "$INVOCATION" | jq -r '.StdErr'

          if [ "$STATUS" != "Success" ]; then
            echo "Deployment failed with status: $STATUS"
            exit 1
          fi
